<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zerbitzuak Lab · Ikasi zerbitzuak zerotik adituraino</title>
<meta name="description" content="Sareko Zerbitzuak ikasteko tresna gamifikatua: teoria, komandoak eta ariketa praktikoak euskeraz, Ubuntu GNU/Linux-en.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<!-- Topbar (móvil) -->
<header class="topbar">
  <button class="burger" id="burger" aria-label="Menua">☰</button>
  <strong>🌐 Zerbitzuak·lab</strong>
  <span class="tb-coins" id="tb-coins">0 🪙</span>
</header>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <a class="brand" href="#/">
      <span class="logo">🌐</span>
      <span>ZERBITZUAK·lab<small>Sareko zerbitzuak · Ubuntu</small></span>
    </a>

    <!-- Panel del jugador -->
    <div class="player">
      <div class="coins"><span class="c" id="p-coins">0</span> 🪙 txanpon</div>
      <div class="lvl" id="p-level">Maila 1</div>
      <div class="bar"><i id="p-bar"></i></div>
      <div class="meta"><span id="p-prog-l">0%</span><span id="p-totalprog">Aurrerapena 0%</span></div>
      <div class="meta"><span>✅ <span id="p-done">0/9</span></span><span id="p-streak">0 🔥</span></div>
    </div>

    <nav id="sidebar-nav"></nav>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- Main -->
  <main class="main">
    <div class="wrap" id="main-content"></div>
  </main>
</div>

<!-- Modal recompensa -->
<div class="modal" id="modal"><div class="box"></div></div>

<script src="assets/edukiak.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
